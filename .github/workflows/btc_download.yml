name: BTCUSDT 30s 3Y Raw Data

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        run: python btc30s.py

      - name: Commit daily progress & checkpoint
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add daily/ checkpoint.txt completed.flag 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update daily data & checkpoint [skip ci]"
            git push
          fi

      - name: Upload artifact (CSV + daily)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: BTCUSDT-30s-3Y-Raw
          path: |
            BTCUSDT_30s_3Y.csv
            checkpoint.txt
            daily/
