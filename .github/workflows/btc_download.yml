name: BTCUSDT 30s 5Y Continuous

on:
  schedule:
    - cron: '0 */6 * * *'   # Mỗi 6 giờ
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6 tiếng

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas pandas-ta   # Sửa thành pandas-ta

      - name: Run script
        id: run-bot
        run: python btc30s.py

      - name: Commit daily progress & checkpoint
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add daily/ checkpoint.txt completed.flag 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update daily data & checkpoint [skip ci]"
            git push
          fi

      - name: Commit final CSV if created
        if: success()
        run: |
          if [ -f BTCUSDT_30s_5Y_Ultimate_Indicators.csv ]; then
            git add BTCUSDT_30s_5Y_Ultimate_Indicators.csv
            if git diff --staged --quiet; then
              echo "CSV already committed."
            else
              git commit -m "Add final indicators CSV [skip ci]"
              git push
            fi
          fi

      - name: Upload artifact (always, nếu có file)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: BTCUSDT-30s-5Y-Ultimate
          path: |
            BTCUSDT_30s_5Y_Ultimate_Indicators.csv
            checkpoint.txt
            daily/
