name: BTCUSDT 30s 5Y Ultimate

on:
  schedule:
    - cron: '0 12 * * *'   # Chạy mỗi ngày lúc 12:00 UTC
  workflow_dispatch:
    inputs:
      retry_count:
        description: 'Số lần retry'
        required: false
        default: '0'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # tối đa 6 tiếng

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Restore cache
        uses: actions/cache/restore@v4
        id: cache-restore
        with:
          path: |
            daily/
            checkpoint.txt
            completed.flag
          key: btc-daily-state

      - name: Set retry count
        id: vars
        run: |
          RETRY="${{ github.event.inputs.retry_count }}"
          if [ -z "$RETRY" ]; then RETRY=0; fi
          echo "RETRY_COUNT=$RETRY" >> $GITHUB_ENV
          echo "Retry count: $RETRY"

      - name: Check completed
        id: check
        run: |
          if [ -f completed.flag ]; then
            echo "COMPLETED=true" >> $GITHUB_ENV
          else
            echo "COMPLETED=false" >> $GITHUB_ENV
          fi

      - name: Run script
        if: env.COMPLETED == 'false'
        id: run-bot
        run: python btc30s.py

      - name: Save cache (always)
        if: always() && env.COMPLETED == 'false'
        uses: actions/cache/save@v4
        with:
          path: |
            daily/
            checkpoint.txt
            completed.flag
          key: btc-daily-state

      - name: Upload artifact on success
        if: success() && env.COMPLETED == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: BTCUSDT-30s-5Y
          path: BTCUSDT_30s_full.csv

      - name: Auto-retry on failure
        if: failure() && env.RETRY_COUNT < '3'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            const retry = parseInt(process.env.RETRY_COUNT) + 1;
            console.log(`Retry attempt ${retry}...`);
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'btc_download.yml',
              ref: context.ref,
              inputs: {
                retry_count: retry.toString()
              }
            });
