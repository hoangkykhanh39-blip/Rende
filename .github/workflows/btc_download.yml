name: BTCUSDT 30s 5Y Batched

on:
  schedule:
    - cron: '0 */2 * * *'   # Mỗi 2 giờ
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas pandas_ta

      - name: Run batch script
        id: run-batch
        run: python btc30s.py

      - name: Commit and push progress
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add daily/ checkpoint.txt completed.flag 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update daily data & checkpoint [skip ci]"
            git push
          fi

      - name: Upload final CSV if completed
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: BTCUSDT-30s-5Y-Ultimate
          path: BTCUSDT_30s_5Y_Ultimate_Indicators.csv
